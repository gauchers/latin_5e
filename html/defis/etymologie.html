<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --brick:#9C2B1F; --brick-dark:#6E1F16; --gold:#C9A227; --cream:#FDF6EC; --parch:#F1E4D0; --parch-dark:#E4D2B4;
    --umber:#2B1B12; --ink:#3A2A1F; --ink-soft:#7A6A56; --good:#3F7A52; --bad:#B23A2E;
    --serif:'Cormorant Garamond', Georgia, serif; --sans:'Inter', system-ui, sans-serif;
  }
  body { margin:0; font-family:var(--sans); color:var(--ink); background:transparent; }
  .quiz-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.4rem; gap:1rem;}
  .quiz-title { font-family:var(--serif); font-weight:700; font-size:1.5rem; color:var(--brick-dark); margin:0; }
  .quiz-sub { font-size:0.85rem; color:var(--ink-soft); margin:0.2rem 0 0; }
  #score-pill { display:none; align-items:center; background:var(--umber); color:var(--cream); padding:0.5rem 1rem; border-radius:999px; font-weight:700; font-size:0.9rem; }
  
  .game-container { display:flex; flex-direction:column; gap:1.5rem; }
  .pool { display:flex; flex-wrap:wrap; gap:0.6rem; padding:1rem; background:var(--parch-dark); border-radius:12px; min-height:3.5rem; justify-content:center; }
  .draggable-word { background:var(--cream); border:2px solid var(--parch-dark); padding:0.45rem 0.8rem; border-radius:8px; font-weight:600; font-size:0.88rem; cursor:grab; user-select:none; }
  .draggable-word.correct { border-color:var(--good); background:#EAF3EC; color:#1e462a; }
  .draggable-word.incorrect { border-color:var(--bad); background:#FBEAE8; color:#6b211a; }

  .etymo-row { background:var(--cream); border:1px solid var(--parch-dark); border-radius:12px; padding:1rem; display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; align-items:center; }
  .root-title { font-family:var(--serif); font-weight:700; font-size:1.15rem; color:var(--brick); margin:0; }
  .root-meaning { font-size:0.8rem; color:var(--ink-soft); font-style:italic; }
  .drop-zone { border:2px dashed var(--parch-dark); border-radius:8px; min-height:3.2rem; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0.2rem; font-size:0.78rem; color:var(--ink-soft); background:rgba(255,255,255,0.3); }
  .drop-zone.drag-over { border-color:var(--gold); background:#FFFDF9; }
  .drop-zone .draggable-word { width:90%; text-align:center; box-sizing:border-box; }

  .quiz-actions { display:flex; gap:0.8rem; margin-top:1rem; }
  .btn { border:none; border-radius:10px; padding:0.75rem 1.4rem; font-weight:700; font-size:0.9rem; cursor:pointer; }
  .btn.primary { background:var(--brick); color:var(--cream); }
  .btn.primary:hover { background:var(--brick-dark); }
  .btn.ghost { background:transparent; color:var(--brick); border:2px solid var(--brick); }
  .btn.ghost:hover { background:var(--brick); color:var(--cream); }
</style>
</head>
<body>

  <div class="quiz-head">
    <div>
      <p class="quiz-title">L'Arbre des Doublets</p>
      <p class="quiz-sub">Glisse chaque mot français dérivé dans la bonne case (évolution populaire ou emprunt savant).</p>
    </div>
    <div id="score-pill">Score : <span id="score-value">0/0</span></div>
  </div>

  <div class="game-container">
    <div class="pool" id="word-pool"></div>
    <div id="etymo-rows" style="display:flex; flex-direction:column; gap:0.8rem;"></div>
  </div>

  <div class="quiz-actions">
    <button class="btn primary" id="validate-btn">Valider mes associations</button>
    <button class="btn ghost" id="retry-btn" style="display:none;">Recommencer</button>
  </div>

<script>
  const roots = [
    { latin: "Fabrica", mean: "atelier / métier", pop: "Forge", sav: "Fabrique" },
    { latin: "Fragilis", mean: "cassable", pop: "Frêle", sav: "Fragile" },
    { latin: "Singularis", mean: "unique", pop: "Sanglier", sav: "Singulier" },
    { latin: "Capitulum", mean: "petite tête", pop: "Chapitre", sav: "Capitule" }
  ];

  const pool = document.getElementById("word-pool");
  const rowsContainer = document.getElementById("etymo-rows");
  const valBtn = document.getElementById("validate-btn");
  const retBtn = document.getElementById("retry-btn");
  const scorePill = document.getElementById("score-pill");

  function init() {
    pool.innerHTML = ""; rowsContainer.innerHTML = "";
    scorePill.style.display = "none"; retBtn.style.display = "none"; valBtn.style.display = "inline-block";

    let words = [];
    roots.forEach((r, idx) => {
      words.push({ text: r.pop, type: "pop", rIdx: idx });
      words.push({ text: r.sav, type: "sav", rIdx: idx });

      const row = document.createElement("div");
      row.className = "etymo-row";
      row.innerHTML = `
        <div><span class="root-title">${r.latin}</span><div class="root-meaning">${r.mean}</div></div>
        <div class="drop-zone" data-type="pop" data-ridx="${idx}">Évolution populaire (orale)</div>
        <div class="drop-zone" data-type="sav" data-ridx="${idx}">Emprunt savant (écrit)</div>
      `;
      rowsContainer.appendChild(row);
    });

    // Configuration des zones de dépôt
    document.querySelectorAll('.drop-zone, #word-pool').forEach(zone => {
      zone.addEventListener("dragover", e => e.preventDefault());
      zone.addEventListener("dragenter", () => zone.classList.add("drag-over"));
      zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
      zone.addEventListener("drop", e => {
        e.preventDefault(); zone.classList.remove("drag-over");
        const id = e.dataTransfer.getData("text/plain");
        const el = document.getElementById(id);
        if(el) zone.appendChild(el);
      });
    });

    // Mélange et affichage des étiquettes
    words.sort(() => Math.random() - 0.5).forEach((w, i) => {
      const el = document.createElement("div");
      el.className = "draggable-word"; el.draggable = true; el.id = `w-${i}`;
      el.textContent = w.text; el.dataset.type = w.type; el.dataset.ridx = w.rIdx;
      el.addEventListener("dragstart", e => e.dataTransfer.setData("text/plain", el.id));
      pool.appendChild(el);
    });
  }

  valBtn.addEventListener("click", () => {
    let score = 0;
    const total = roots.length * 2;
    document.querySelectorAll(".draggable-word").forEach(el => {
      el.draggable = false;
      const parent = el.parentElement;
      if (parent.classList.contains("drop-zone") && parent.dataset.type === el.dataset.type && parent.dataset.ridx === el.dataset.ridx) {
        score++; el.classList.add("correct");
      } else {
        el.classList.add("incorrect");
      }
    });
    document.getElementById("score-value").textContent = `${score}/${total}`;
    scorePill.style.display = "inline-flex"; valBtn.style.display = "none"; retBtn.style.display = "inline-block";
  });

  retBtn.addEventListener("click", init);
  init();
</script>
</body>
</html>
