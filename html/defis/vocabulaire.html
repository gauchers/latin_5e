<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  /* On récupère uniquement le strict minimum CSS hérité du parent pour l'iframe */
  :root{
    --brick:#9C2B1F; --brick-dark:#6E1F16; --gold:#C9A227; --cream:#FDF6EC; --parch:#F1E4D0; --parch-dark:#E4D2B4;
    --umber:#2B1B12; --ink:#3A2A1F; --ink-soft:#7A6A56; --good:#3F7A52; --bad:#B23A2E;
    --serif:'Cormorant Garamond', Georgia, serif; --sans:'Inter', system-ui, sans-serif;
  }
  body { margin: 0; font-family: var(--sans); color: var(--ink); background: transparent; }
  .quiz-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.4rem; gap:1rem;}
  .quiz-title { font-family: var(--serif); font-weight: 700; font-size: 1.5rem; color: var(--brick-dark); margin: 0; }
  .quiz-sub { font-size: 0.85rem; color: var(--ink-soft); margin: 0.2rem 0 0; }
  #score-pill { display: none; align-items: center; background: var(--umber); color: var(--cream); padding: 0.5rem 1rem; border-radius: 999px; font-weight: 700; font-size: 0.9rem; }
  
  .q-block { background: var(--cream); border-radius: 12px; padding: 1.1rem 1.2rem; margin-bottom: 0.9rem; }
  .q-text { font-weight: 700; font-size: 0.98rem; margin: 0 0 0.7rem; }
  .q-opts { display: grid; gap: 0.5rem; }
  .q-opt { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.7rem; border-radius: 9px; border: 2px solid var(--parch-dark); font-size: 0.9rem; cursor: pointer; background: var(--cream); }
  .q-opt:hover { border-color: var(--gold); }
  .q-opt input { accent-color: var(--brick); width: 16px; height: 16px; }
  .q-opt.correct { border-color: var(--good); background: #EAF3EC; }
  .q-opt.incorrect { border-color: var(--bad); background: #FBEAE8; }
  .q-feedback { font-size: 0.82rem; margin: 0.55rem 0 0; font-weight: 600; display: none; }
  .q-feedback.good { color: var(--good); }
  .q-feedback.bad { color: var(--bad); }

  .quiz-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
  .btn { border: none; border-radius: 10px; padding: 0.75rem 1.4rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
  .btn.primary { background: var(--brick); color: var(--cream); }
  .btn.primary:hover { background: var(--brick-dark); }
  .btn.ghost { background: transparent; color: var(--brick); border: 2px solid var(--brick); }
  .btn.ghost:hover { background: var(--brick); color: var(--cream); }
</style>
</head>
<body>

  <div class="quiz-head">
    <div>
      <p class="quiz-title">Vocabulaire</p>
      <p class="quiz-sub">Que signifient ces mots latins ?</p>
    </div>
    <div id="score-pill">Score : <span id="score-value">0/0</span></div>
  </div>

  <div id="quiz-body"></div>

  <div class="quiz-actions">
    <button class="btn primary" id="validate-btn">Valider mes réponses</button>
    <button class="btn ghost" id="retry-btn" style="display:none;">Recommencer</button>
  </div>

<script>
  const questions = [
    { q: "« aqua » signifie…", opts: ["l'eau", "le feu", "la terre", "le vent"], a: 0 },
    { q: "« pater » signifie…", opts: ["le père", "le frère", "le fils", "l'oncle"], a: 0 },
    { q: "« mater » signifie…", opts: ["la sœur", "la mère", "la fille", "la tante"], a: 1 }
    // Ajoute autant de questions que tu veux ici pour ce thème spécifique !
  ];

  const body = document.getElementById("quiz-body");
  const valBtn = document.getElementById("validate-btn");
  const retBtn = document.getElementById("retry-btn");
  const scorePill = document.getElementById("score-pill");
  const scoreValue = document.getElementById("score-value");

  function init() {
    body.innerHTML = "";
    scorePill.style.display = "none";
    retBtn.style.display = "none";
    valBtn.style.display = "inline-block";

    questions.forEach((q, qi) => {
      const block = document.createElement("div");
      block.className = "q-block";
      const opts = q.opts.map((opt, oi) => `
        <label class="q-opt">
          <input type="radio" name="q${qi}" value="${oi}">
          <span>${opt}</span>
        </label>
      `).join("");
      block.innerHTML = `<p class="q-text">${qi + 1}. ${q.q}</p><div class="q-opts">${opts}</div><p class="q-feedback"></p>`;
      body.appendChild(block);
    });
  }

  valBtn.addEventListener("click", () => {
    let score = 0;
    const blocks = body.querySelectorAll(".q-block");
    
    blocks.forEach((block, qi) => {
      const q = questions[qi];
      const checked = block.querySelector("input:checked");
      const feedback = block.querySelector(".q-feedback");
      const optEls = [...block.querySelectorAll(".q-opt")];
      
      block.querySelectorAll("input").forEach(i => i.disabled = true);
      optEls[q.a].classList.add("correct");

      const chosen = checked ? parseInt(checked.value, 10) : null;
      if (chosen === q.a) {
        score++;
        feedback.textContent = "Bonne réponse !";
        feedback.className = "q-feedback good";
      } else {
        if (chosen !== null) optEls[chosen].classList.add("incorrect");
        feedback.textContent = chosen === null ? "Pas de réponse choisie." : "Ce n'est pas ça.";
        feedback.className = "q-feedback bad";
      }
      feedback.style.display = "block";
    });

    scoreValue.textContent = `${score}/${questions.length}`;
    scorePill.style.display = "inline-flex";
    valBtn.style.display = "none";
    retBtn.style.display = "inline-block";
  });

  retBtn.addEventListener("click", init);
  init();
</script>
</body>
</html>
